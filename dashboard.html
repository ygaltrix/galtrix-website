<style>
  :root{
    --bg:#04050d;
    --panel:#0a0d1c;
    --panel-2:#0d1124;
    --border:rgba(148,163,184,0.10);
    --border-strong:rgba(148,163,184,0.18);
    --cyan:#22d3ee;
    --cyan-soft:rgba(34,211,238,0.5);
    --purple:#a855f7;
    --purple-soft:rgba(168,85,247,0.5);
    --text:#e6ecff;
    --muted:#7b86a8;
  }
  html,body,#root{height:100%;}
  html,body{background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden;}
  *{box-sizing:border-box}
  .font-display{font-family:'Space Grotesk','Inter',sans-serif; letter-spacing:-0.02em;}
  .font-mono{font-family:'JetBrains Mono',ui-monospace,monospace;}

  /* ---------- Ambient background ---------- */
  .bg-stage{position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
    background:
      radial-gradient(900px 700px at 12% 8%, rgba(12,26,54,0.85) 0%, transparent 60%),
      radial-gradient(1100px 900px at 88% 24%, rgba(30,10,52,0.82) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 120%, #05071a 0%, #02030a 60%);}
  .bg-stage .grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(to right, rgba(125,211,252,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(168,140,255,0.035) 1px, transparent 1px);
    background-size:64px 64px;
    -webkit-mask-image:radial-gradient(ellipse 80% 65% at 50% 35%, #000 25%, transparent 85%);
            mask-image:radial-gradient(ellipse 80% 65% at 50% 35%, #000 25%, transparent 85%);}
  .bg-stage .glow{position:absolute; border-radius:50%; filter:blur(110px); mix-blend-mode:screen;}
  .bg-stage .glow.cyan{width:60vmax; height:60vmax; top:-30%; left:-25%;
    background:radial-gradient(circle, rgba(34,211,238,0.55), rgba(34,211,238,0) 60%);
    animation:float1 34s ease-in-out infinite;}
  .bg-stage .glow.purple{width:60vmax; height:60vmax; top:-10%; right:-25%;
    background:radial-gradient(circle, rgba(168,85,247,0.55), rgba(168,85,247,0) 60%);
    animation:float2 42s ease-in-out infinite;}
  .bg-stage .glow.cyan2{width:50vmax; height:50vmax; bottom:-35%; left:25%;
    background:radial-gradient(circle, rgba(56,189,248,0.35), rgba(56,189,248,0) 60%);
    animation:float3 50s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(6%,4%)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-5%,5%)}}
  @keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(3%,-3%)}}

  /* Glass panels */
  .glass{
    background:linear-gradient(180deg, rgba(13,17,36,0.72), rgba(8,11,24,0.72));
    border:1px solid var(--border);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
  }
  .glass-strong{
    background:linear-gradient(180deg, rgba(18,22,44,0.85), rgba(10,13,28,0.85));
    border:1px solid var(--border-strong);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
  }
  .hairline{border:1px solid var(--border);}
  .hairline-strong{border:1px solid var(--border-strong);}

  /* Gradient text */
  .grad-text{
    background:linear-gradient(90deg,#67e8f9,#c4b5fd);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .grad-border{
    background:
      linear-gradient(var(--panel-2),var(--panel-2)) padding-box,
      linear-gradient(135deg, rgba(34,211,238,0.55), rgba(168,85,247,0.55)) border-box;
    border:1px solid transparent;
  }

  /* Soft glow */
  .glow-cyan{box-shadow:0 0 0 1px rgba(34,211,238,0.25), 0 8px 40px -10px rgba(34,211,238,0.35);}
  .glow-purple{box-shadow:0 0 0 1px rgba(168,85,247,0.25), 0 8px 40px -10px rgba(168,85,247,0.35);}

  /* Status pills */
  .pill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;}
  .pill .dot{width:6px; height:6px; border-radius:999px;}
  .pill.new{background:rgba(34,211,238,0.10); color:#67e8f9; border:1px solid rgba(34,211,238,0.25);} .pill.new .dot{background:#22d3ee; box-shadow:0 0 10px #22d3ee;}
  .pill.contacted{background:rgba(168,85,247,0.10); color:#d8b4fe; border:1px solid rgba(168,85,247,0.25);} .pill.contacted .dot{background:#a855f7; box-shadow:0 0 10px #a855f7;}
  .pill.archived{background:rgba(148,163,184,0.08); color:#94a3b8; border:1px solid rgba(148,163,184,0.18);} .pill.archived .dot{background:#94a3b8;}

  /* Sidebar nav */
  .nav-item{display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; color:#9aa3c0; font-weight:500; font-size:14px; transition:all .22s ease; cursor:pointer; border:1px solid transparent;}
  .nav-item:hover{background:rgba(34,211,238,0.04); color:#e6ecff; border-color:var(--border);}
  .nav-item.active{
    color:#eaf4ff;
    background:linear-gradient(90deg, rgba(34,211,238,0.12), rgba(168,85,247,0.10));
    border-color:rgba(34,211,238,0.22);
    box-shadow:inset 0 0 0 1px rgba(34,211,238,0.08), 0 4px 22px -10px rgba(34,211,238,0.35);
  }
  .nav-item svg{opacity:.9;}

  /* Table rows */
  .row{transition:all .2s ease;}
  .row:hover{background:rgba(34,211,238,0.04);}
  .row.selected{background:linear-gradient(90deg, rgba(34,211,238,0.08), rgba(168,85,247,0.06));}

  /* Custom scrollbars */
  .scroll-y{overflow-y:auto;}
  .scroll-y::-webkit-scrollbar{width:10px;}
  .scroll-y::-webkit-scrollbar-track{background:transparent;}
  .scroll-y::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.12); border-radius:10px; border:2px solid transparent; background-clip:padding-box;}
  .scroll-y::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.22); background-clip:padding-box;}

  /* Inputs */
  .input{
    width:100%; background:rgba(8,10,24,0.7); color:var(--text);
    border:1px solid var(--border); border-radius:10px; padding:10px 12px 10px 38px;
    font-size:13.5px; outline:none; transition:all .2s ease;
  }
  .input:focus{border-color:rgba(34,211,238,0.45); box-shadow:0 0 0 3px rgba(34,211,238,0.12);}
  .btn{
    display:inline-flex; align-items:center; gap:8px; padding:8px 14px;
    border-radius:10px; font-size:13px; font-weight:600;
    border:1px solid var(--border); background:rgba(13,17,36,0.6); color:#cbd5ff;
    transition:all .2s ease; cursor:pointer;
  }
  .btn:hover{border-color:rgba(34,211,238,0.35); color:#fff;}
  .btn.primary{
    background:linear-gradient(135deg, rgba(34,211,238,0.18), rgba(168,85,247,0.18));
    border-color:rgba(34,211,238,0.4); color:#eaf4ff;
    box-shadow:0 6px 28px -12px rgba(34,211,238,0.45);
  }
  .btn.primary:hover{border-color:rgba(168,85,247,0.55); box-shadow:0 8px 32px -10px rgba(168,85,247,0.55);}
  .btn.danger{color:#fecaca; border-color:rgba(239,68,68,0.3);}
  .btn.danger:hover{background:rgba(239,68,68,0.10);}

  /* Segmented */
  .seg{display:inline-flex; padding:4px; border-radius:12px; background:rgba(8,10,24,0.7); border:1px solid var(--border);}
  .seg button{padding:7px 14px; font-size:12.5px; font-weight:600; color:#8b95b6; border-radius:8px; transition:all .18s ease;}
  .seg button:hover{color:#e6ecff;}
  .seg button.on{color:#eaf4ff; background:linear-gradient(135deg, rgba(34,211,238,0.20), rgba(168,85,247,0.20)); box-shadow:inset 0 0 0 1px rgba(34,211,238,0.28);}
  .seg button .n{margin-left:6px; font-size:11px; padding:1px 6px; border-radius:999px; background:rgba(148,163,184,0.12); color:#cbd5ff;}

  /* KPI sparkline */
  .spark-path{fill:none; stroke-width:1.75;}

  /* Side panel slide-in */
  @keyframes slide-in{from{transform:translateX(30px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  .slide-in{animation:slide-in .28s ease-out;}
  @keyframes fade-in{from{opacity:0;} to{opacity:1;}}
  .fade-in{animation:fade-in .3s ease-out;}

  /* Pulse dot */
  .live::before{content:""; width:6px; height:6px; border-radius:999px; background:#22d3ee; box-shadow:0 0 10px #22d3ee; display:inline-block; margin-right:8px; animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1; transform:scale(1);}50%{opacity:.4; transform:scale(.85);}}

  /* Chart bars */
  .bar{fill:url(#barGrad);}

  /* Keyboard chip */
  .kbd{font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:2px 6px; border-radius:5px; background:rgba(148,163,184,0.10); border:1px solid var(--border); color:#9aa3c0;}

  /* Logo mark */
  .logo-hex{filter:drop-shadow(0 0 16px rgba(34,211,238,0.25));}

  /* Utility */
  .divider{height:1px; background:linear-gradient(90deg, transparent, rgba(148,163,184,0.16), transparent);}
</style>
</head>

      source: pick(["Hero CTA","Footer Form","/ventures","/contact","Inbound"]),
      submittedAt: daysAgo(Math.floor(Math.random()*26)),
      status,
      history: [
        { t: "submitted", at: daysAgo(Math.floor(Math.random()*26)+1) },
      ],
    });
  }
  return out.sort((a,b)=> new Date(b.submittedAt) - new Date(a.submittedAt));
}

/* ================= Formspree connector =================
   Calls the Azure Function proxy at CONFIG.FORMSPREE_PROXY.
   The proxy reads FORMSPREE_FORM_ID + FORMSPREE_PAT from SWA app settings
   and returns already-normalized submissions. No secrets in the browser.
======================================================== */
async function fetchFormspreeLeads(){
  try {
    const r = await fetch(CONFIG.FORMSPREE_PROXY, { headers: { "Accept":"application/json" } });
    if (!r.ok) throw new Error("proxy http "+r.status);
    const j = await r.json();
    if (!j.ok) {
      console.warn("[Formspree proxy]", j.error, j.message);
      return null;
    }
    return j.submissions;
  } catch(e){
    console.warn("[Formspree] falling back to mock:", e.message);
    return null;
  }
}

/* ================= Gmail connector (Google Identity Services) =================
   Token flow:
     1. gapi.load('client') → gapi.client.init({ apiKey, discoveryDocs })
     2. google.accounts.oauth2.initTokenClient({ client_id, scope, callback })
     3. User clicks "Connect Gmail" → tokenClient.requestAccessToken()
     4. gapi.client.gmail.users.messages.list({ userId:'me', q })
     5. messages.get for each id → parse headers + snippet
   Access token is kept in memory only (sessionStorage) — never committed.
============================================================================= */
// Safe sessionStorage — disabled inside data:/file:/ URLs and some private-mode browsers
const SS = {
  get(k){ try { return sessionStorage.getItem(k); } catch { return null; } },
  set(k,v){ try { sessionStorage.setItem(k,v); } catch {} },
  del(k){ try { sessionStorage.removeItem(k); } catch {} },
};

const Gmail = {
  tokenClient: null,
  accessToken: null,
  profileEmail: null,   // the real address the user signed in with
  _initPromise: null,

  isConfigured(){
    return !!(CONFIG.GMAIL_CLIENT_ID && CONFIG.GMAIL_API_KEY);
  },

  async _waitForScripts(){
    // Only Google Identity Services is needed — Gmail API is called via fetch.
    const start = Date.now();
    while (!(window.google && window.google.accounts && window.google.accounts.oauth2)) {
      if (Date.now() - start > 10000) {
        throw new Error(
          "Google Identity Services didn't load. Likely causes: Brave Shields or " +
          "a privacy extension blocking accounts.google.com, a strict CSP, or a network issue."
        );
      }
      await new Promise(r => setTimeout(r, 100));
    }
  },

  // Dedupe concurrent callers — if init is already in-flight, everyone awaits the same promise
  init(){
    if (!this.isConfigured()) return Promise.resolve(false);
    if (!this._initPromise) this._initPromise = this._doInit().catch(e => { this._initPromise = null; throw e; });
    return this._initPromise;
  },

  async _doInit(){
    await this._waitForScripts();

    if (!this.tokenClient) {
      this.tokenClient = window.google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.GMAIL_CLIENT_ID,
        scope: CONFIG.GMAIL_SCOPE,
        callback: () => {}, // per-request callback set in signIn()
      });
    }

    // Restore a prior token if still valid
    const cached = SS.get("galtrix.gmail.token");
    if (cached) {
      try {
        const { access_token, expires_at, profileEmail } = JSON.parse(cached);
        if (expires_at && expires_at > Date.now() + 60_000) {
          this.accessToken = access_token;
          this.profileEmail = profileEmail || null;
        }
      } catch {}
    }
    return true;
  },

  async signIn(){
    if (!this.tokenClient) await this.init();
    return new Promise((resolve, reject) => {
      this.tokenClient.callback = async (resp) => {
        if (resp.error) return reject(new Error(resp.error));
        this.accessToken = resp.access_token;
        const expires_at = Date.now() + (resp.expires_in || 3600) * 1000;
        SS.set("galtrix.gmail.token", JSON.stringify({ access_token: resp.access_token, expires_at }));
        // Fetch the real signed-in email — helpful if the user picked a different account than CONFIG.GMAIL_DESTINATION
        try {
          const prof = await this._api("users/me/profile");
          this.profileEmail = prof.emailAddress || null;
          console.log("[Gmail] signed in as", this.profileEmail);
          // Re-persist with profileEmail so a page refresh restores the right label
          SS.set("galtrix.gmail.token", JSON.stringify({ access_token: resp.access_token, expires_at, profileEmail: this.profileEmail }));
        } catch(e){ console.warn("[Gmail] profile fetch failed:", e.message); }
        resolve(resp);
      };
      // prompt:'' = silent if possible, fall back to account chooser
      this.tokenClient.requestAccessToken({ prompt: this.accessToken ? "" : "consent" });
    });
  },

  signOut(){
    const t = this.accessToken;
    this.accessToken = null;
    this.profileEmail = null;
    SS.del("galtrix.gmail.token");
    if (t && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(t, () => {});
    }
  },

  // Direct Gmail REST call with Bearer token — no gapi dependency
  async _api(path, params){
    if (!this.accessToken) throw new Error("Not signed in to Gmail");
    const url = new URL("https://gmail.googleapis.com/gmail/v1/" + path);
    if (params) for (const [k,v] of Object.entries(params)) {
      if (Array.isArray(v)) v.forEach(vv => url.searchParams.append(k, vv));
      else if (v !== undefined && v !== null) url.searchParams.set(k, String(v));
    }
    const r = await fetch(url.toString(), {
      headers: { Authorization: `Bearer ${this.accessToken}` },
    });
    if (r.status === 401) { this.signOut(); throw new Error("Gmail token expired — please reconnect"); }
    if (!r.ok) {
      const txt = await r.text().catch(()=> "");
      throw new Error("Gmail API " + r.status + ": " + txt.slice(0, 240));
    }
    return r.json();
  },

  // Decode base64url (Gmail's encoding for message body data)
  _decodeB64Url(s){
    if (!s) return "";
    try {
      const b64 = s.replace(/-/g,'+').replace(/_/g,'/') + "===".slice((s.length+3)%4);
      return decodeURIComponent(escape(atob(b64)));
    } catch { return ""; }
  },

  // Walk payload parts, prefer text/plain, fall back to text/html
  _extractBody(payload){
    if (!payload) return "";
    const walk = (p) => {
      if (!p) return null;
      if (p.mimeType === "text/plain" && p.body && p.body.data) return { mime:"plain", data:p.body.data };
      if (p.mimeType === "text/html"  && p.body && p.body.data) return { mime:"html",  data:p.body.data };
      if (p.parts && p.parts.length){
        // Prefer plain
        for (const c of p.parts){ const r = walk(c); if (r && r.mime === "plain") return r; }
        for (const c of p.parts){ const r = walk(c); if (r) return r; }
      }
      return null;
    };
    const found = walk(payload);
    if (!found) return "";
    const raw = this._decodeB64Url(found.data);
    if (found.mime === "plain") return raw;
    // Strip HTML → text
    return raw
      .replace(/<style[\s\S]*?<\/style>/gi, " ")
      .replace(/<script[\s\S]*?<\/script>/gi, " ")
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<\/p>/gi, "\n")
      .replace(/<\/tr>/gi, "\n")
      .replace(/<\/td>/gi, ": ")
      .replace(/<[^>]+>/g, "")
      .replace(/&nbsp;/g, " ")
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&#39;/g, "'")
      .replace(/&quot;/g, '"');
  },

  // Parse a Formspree notification email body into the fields of the form.
  // Handles BOTH layouts Formspree uses in the wild:
  //   (a) "fieldName: value"              — classic single-line key-value
  //   (b) "fieldName\nvalue"              — label on one line, value on the next
  //                                         (current default template)
  _parseFormspreeBody(text){
    if (!text) return {};
    const out = {};

    // Known Formspree / contact-form field labels. When a line matches one of
    // these exactly (lowercased, no spaces), treat it as a label and take the
    // next non-empty line as the value.
    const knownFields = new Set([
      "fullname","name","firstname","lastname","email","emailaddress",
      "project","message","comments","comment","subject","phone","phonenumber",
      "source","company","budget","timeline","country","website","url",
    ]);

    const lines = text.split(/\r?\n/).map(l => l.trim());
    const kv = /^([A-Za-z][A-Za-z0-9_\- ]{0,40})\s*[:=]\s*(.+)$/;

    let lastKey = null;
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      // Blank line ends any continuation context
      if (!line) { lastKey = null; continue; }

      // Strategy (a): inline key:value
      const m = line.match(kv);
      if (m) {
        const key = m[1].trim().toLowerCase().replace(/\s+/g,"");
        out[key] = (m[2] || "").trim();
        lastKey = key;
        continue;
      }

      // Strategy (b): line IS a known field label → next non-empty line is the value
      const normalizedKey = line.toLowerCase().replace(/\s+/g,"");
      if (line.length <= 40 && knownFields.has(normalizedKey) && !out[normalizedKey]) {
        lastKey = normalizedKey;
        continue;
      }

      // Otherwise: continuation of the previous value (multi-line messages)
      if (lastKey) {
        out[lastKey] = out[lastKey] ? (out[lastKey] + " " + line).trim() : line;
      }
    }
    return out;
  },

  async _fetchFullMessages(q, max){
    if (!this.accessToken) return [];
    const listJson = await this._api("users/me/messages", { q, maxResults: max });
    const ids = (listJson.messages || []).map(m => m.id);
    console.log(`[Gmail] query="${q}"  →  ${ids.length} message(s) matched (resultSizeEstimate=${listJson.resultSizeEstimate ?? "?"})`);
    if (!ids.length) return [];
    const msgs = await Promise.all(ids.map(id =>
      this._api(`users/me/messages/${encodeURIComponent(id)}`, { format: "full" })
    ));
    return msgs; // raw JSON — same shape as gapi's .result
  },

  async fetchNotifications(max = 30){
    if (!this.accessToken) return null;
    const msgs = await this._fetchFullMessages(CONFIG.GMAIL_QUERY, max);
    return msgs.map(r => {
      const headers = Object.fromEntries(((r.payload && r.payload.headers) || []).map(h => [h.name.toLowerCase(), h.value]));
      const from = headers["from"] || "";
      const m = from.match(/<([^>]+)>/); const fromEmail = m ? m[1] : from;
      const date = headers["date"] ? new Date(headers["date"]).toISOString() : new Date(+r.internalDate || Date.now()).toISOString();
      const unread = (r.labelIds || []).includes("UNREAD");
      return {
        id: r.id,
        from: fromEmail,
        to: headers["to"] || CONFIG.GMAIL_DESTINATION,
        subject: headers["subject"] || "(no subject)",
        preview: (r.snippet || "").slice(0, 140),
        receivedAt: date,
        unread,
        linkedLeadId: null,
      };
    });
  },

  // Parse Formspree notifications → leads. This is the Gmail-only path
  // that bypasses Formspree's paid Submissions API entirely.
  async fetchLeads(max = 50){
    if (!this.accessToken) return null;
    const msgs = await this._fetchFullMessages(CONFIG.GMAIL_QUERY, max);
    return msgs.map(r => {
      const headers = Object.fromEntries(((r.payload && r.payload.headers) || []).map(h => [h.name.toLowerCase(), h.value]));
      const body = this._extractBody(r.payload);
      const fields = this._parseFormspreeBody(body);

      // Lead email: prefer Reply-To (Formspree sets this to the submitter),
      // then any parsed "email" field, then fall back to the snippet.
      const replyTo = headers["reply-to"] || "";
      const replyMatch = replyTo.match(/<([^>]+)>/);
      const email = (replyMatch ? replyMatch[1] : replyTo) || fields.email || "—";

      // Lead name: prefer parsed fullName/name, then the subject tail
      // (Formspree default subject is "New submission from <name>").
      const subj = headers["subject"] || "";
      const subjMatch = subj.match(/new submission from\s+(.+)$/i);
      const name = fields.fullname || fields.name || (subjMatch ? subjMatch[1].trim() : (email.split("@")[0] || "Unknown"));

      // Message: prefer parsed "project" / "message", else fall back to snippet
      const message = fields.project || fields.message || fields.comments || (r.snippet || "").slice(0, 600);

      const source = fields.source || "Formspree → Gmail";
      const submittedAt = headers["date"] ? new Date(headers["date"]).toISOString() : new Date(+r.internalDate || Date.now()).toISOString();

      return {
        id: r.id,
        name,
        email,
        message,
        source,
        submittedAt,
        status: (r.labelIds || []).includes("UNREAD") ? "new" : "contacted",
        history: [{ t: "submitted", at: submittedAt }],
        _gmailId: r.id,
      };
    });
  },
};

const rel = (iso) => {
  const d = new Date(iso), now = new Date();
  const s = Math.max(1, Math.floor((now-d)/1000));
  if (s < 60)    return s + "s ago";
  if (s < 3600)  return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  if (s < 86400*7) return Math.floor(s/86400) + "d ago";
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
};

function KpiCard({ label, value, delta, accent="cyan", points=[] }){
  const color = accent === "cyan" ? "#22d3ee" : accent === "purple" ? "#a855f7" : "#34d399";
  const path = useMemo(()=>{
    if (!points.length) return "";
    const w=160, h=40, max=Math.max(...points), min=Math.min(...points);
    return points.map((p,i)=>{
      const x = (i/(points.length-1))*w;
      const y = h - ((p-min)/Math.max(1,max-min))*h;
      return (i===0?"M":"L") + x.toFixed(1) + "," + y.toFixed(1);
    }).join(" ");
  },[points]);
  return (
    <div className="glass rounded-2xl p-5 relative overflow-hidden group">
      <div className="absolute -right-8 -top-10 w-40 h-40 rounded-full opacity-40 pointer-events-none"
           style={{background:`radial-gradient(circle, ${color}44, transparent 60%)`}}/>

            <linearGradient id={"sp-"+accent} x1="0" y1="0" x2="0" y2="1">

/* ================= Status breakdown ring ================= */
function StatusRing({ counts }){
  const total = Math.max(1, counts.all);
  const items = [
    { k:"new",       n: counts.new,       color:"#22d3ee" },
    { k:"contacted", n: counts.contacted, color:"#a855f7" },
    { k:"archived",  n: counts.archived,  color:"#475569" },
  ];
  let acc = 0;
  const R = 54, C = 2*Math.PI*R;
  return (
    <div className="glass rounded-2xl p-5">
      <div className="font-display text-[15px] font-semibold tracking-tight">Pipeline Health</div>
      <div className="text-[11px] text-slate-500 mt-0.5">Distribution across statuses</div>
      <div className="flex items-center gap-6 mt-3">
        <svg viewBox="0 0 140 140" width="150" height="150">
          <circle cx="70" cy="70" r={R} stroke="rgba(148,163,184,0.10)" strokeWidth="14" fill="none"/>
          {items.map((it,i)=>{
            const frac = it.n/total;
            const len = frac*C;
            const el = (
              <circle key={i} cx="70" cy="70" r={R} stroke={it.color} strokeWidth="14" fill="none"
                      strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-acc} transform="rotate(-90 70 70)" strokeLinecap="butt"/>
            );
            acc += len;
            return el;
          })}
          <text x="70" y="68" textAnchor="middle" fontSize="22" fontWeight="700" fill="#eaf4ff" style={{fontFamily:"Space Grotesk"}}>{counts.all}</text>
          <text x="70" y="86" textAnchor="middle" fontSize="10" fill="#64748b" letterSpacing="2" style={{textTransform:"uppercase"}}>Total leads</text>
        </svg>
        <div className="flex-1 space-y-2.5">
          {items.map((it,i)=>(
            <div key={i} className="flex items-center gap-3">
              <span className="w-2.5 h-2.5 rounded-full" style={{background:it.color, boxShadow:`0 0 10px ${it.color}`}}/>
              <span className="text-[13px] font-medium capitalize flex-1">{it.k}</span>
              <span className="text-[12.5px] text-slate-300 font-mono">{it.n}</span>
              <span className="text-[11px] text-slate-500 w-10 text-right">{Math.round((it.n/total)*100)}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ================= App ================= */
function App(){
  const [view, setView] = useState("overview");
  const [leads, setLeads] = useState([]);
  const [notes, setNotes] = useState([]);
  const [query, setQuery] = useState("");
  const [filter, setFilter] = useState("all");
  const [selectedId, setSelectedId] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [sources, setSources] = useState({ formspree: "mock", gmail: "mock" });
  const [gmailConnected, setGmailConnected] = useState(false);
  const [gmailLoading, setGmailLoading] = useState(false);

  const matchGmailToLeads = (notes, leads) => {
    return notes.map(n => {
      // Try matching by finding a lead whose email appears in the snippet
      // or whose name appears in the subject (Formspree subjects include the name).
      const match = leads.find(l =>
        (n.subject || "").toLowerCase().includes((l.name || "").toLowerCase()) ||
        (n.preview || "").toLowerCase().includes((l.email || "").toLowerCase())
      );
      return { ...n, linkedLeadId: match ? match.id : null };
    });
  };

  const loadAll = useCallback(async () => {
    setRefreshing(true);

    // Lead source priority:
    //   1. Gmail (parses Formspree notification emails directly — works on any plan)
    //   2. Formspree Submissions API proxy (paid plan, if FORMSPREE_PAT set in SWA)
    //   3. Mock data
    let baseLeads = null, leadsSource = "mock";
    if (Gmail.accessToken) {
      try { baseLeads = await Gmail.fetchLeads(); if (baseLeads) leadsSource = "gmail"; }
      catch(e){ console.warn("[Gmail leads] failed:", e); }
    }
    if (!baseLeads) {
      const fs = await fetchFormspreeLeads();
      if (fs) { baseLeads = fs; leadsSource = "formspree"; }
    }
    if (!baseLeads) baseLeads = buildMockLeads();
    setLeads(baseLeads);

    // Gmail notifications panel (always the raw Formspree emails if connected)
    const gm = await fetchGmailNotifications();
    const resolvedNotes = gm ? matchGmailToLeads(gm, baseLeads) : buildMockGmail(baseLeads);
    setNotes(resolvedNotes);

    setSources({ formspree: leadsSource, gmail: gm ? "live" : "mock" });
    setGmailConnected(!!Gmail.accessToken);
    setRefreshing(false);
  }, []);

  // Attempt silent Gmail init on load (restores an existing session if any)
  useEffect(()=>{
    (async () => {
      if (!Gmail.isConfigured()) return;
      try {
        await Gmail.init();
        if (Gmail.accessToken) {
          setGmailConnected(true);
          // Let loadAll fetch notifications now that we have a token
          loadAll();
        }
      } catch (e) { console.warn("Gmail init:", e.message); }
    })();
  },[loadAll]);

  const connectGmail = useCallback(async () => {
    setGmailLoading(true);
    try {
      await Gmail.init();
      await Gmail.signIn();
      setGmailConnected(true);
      await loadAll();
    } catch(e) {
      console.error("Gmail sign-in failed:", e);
      alert("Gmail sign-in failed: " + (e.message || e));
    } finally {
      setGmailLoading(false);
    }
  },[loadAll]);

  const disconnectGmail = useCallback(() => {
    Gmail.signOut();
    setGmailConnected(false);
    setSources(s => ({ ...s, gmail: "mock" }));
    setNotes(buildMockGmail(leads));
  },[leads]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  // ⌘K focuses search
  useEffect(()=>{
    const h = (e)=>{
      if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==="k"){ e.preventDefault(); const el=document.querySelector(".input"); if (el) el.focus(); }
      if (e.key === "Escape") setSelectedId(null);
    };
    window.addEventListener("keydown", h); return ()=>window.removeEventListener("keydown", h);
  },[]);

  const counts = useMemo(()=>({
    all:       leads.length,
    new:       leads.filter(l=>l.status==="new").length,
    contacted: leads.filter(l=>l.status==="contacted").length,
    archived:  leads.filter(l=>l.status==="archived").length,
    unread:    notes.filter(n=>n.unread).length,
  }),[leads, notes]);

  const weekSeries = useMemo(()=>{
    const days = 14;
    const buckets = [];
    for (let i=days-1;i>=0;i--){
      const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
      const nxt = new Date(d); nxt.setDate(d.getDate()+1);
      const count = leads.filter(l => { const t=new Date(l.submittedAt); return t>=d && t<nxt; }).length;
      buckets.push({ label: d.toLocaleDateString(undefined,{weekday:"short"}).slice(0,2), count });
    }
    return buckets;
  },[leads]);

  const weekDelta = useMemo(()=>{
    const now = Date.now();
    const lastWeek = leads.filter(l => now - new Date(l.submittedAt) < 7*86400000).length;
    const prevWeek = leads.filter(l => { const d = now - new Date(l.submittedAt); return d >= 7*86400000 && d < 14*86400000; }).length;
    if (!prevWeek) return "+"+lastWeek;
    const pct = Math.round(((lastWeek-prevWeek)/prevWeek)*100);
    return (pct>=0?"+":"") + pct + "%";
  },[leads]);

  const conversionRate = counts.all ? Math.round((counts.contacted/counts.all)*100) : 0;
  const selected = leads.find(l=>l.id===selectedId) || null;

  const onAction = (id, t) => {
    if (t === "delete"){
      setLeads(ls => ls.filter(l => l.id !== id));
      if (selectedId===id) setSelectedId(null);
      return;
    }
    setLeads(ls => ls.map(l => l.id===id ? {...l, status:t, history:[...l.history, { t, at:new Date().toISOString() }]} : l));
  };

  const openFromInbox = (leadId) => {
    if (leadId){ setView("leads"); setSelectedId(leadId); }
  };

  const leadSourceLabel =
    sources.formspree === "gmail"     ? "LIVE · GMAIL (FORMSPREE EMAILS)" :
    sources.formspree === "formspree" ? "LIVE · FORMSPREE API"            :
    "MOCK · LEADS";
  const liveLabel = `${leadSourceLabel}  /  ${sources.gmail.toUpperCase()} · INBOX`;

  return (
    <div className="h-full w-full flex relative z-10">
      <Sidebar view={view} setView={setView} counts={counts} sources={sources}/>

      <div className="flex-1 flex flex-col min-w-0">
        <Header query={query} setQuery={setQuery} onRefresh={loadAll} refreshing={refreshing} liveLabel={liveLabel}/>

        <main className="flex-1 min-h-0 flex overflow-hidden">
          <div className="flex-1 min-w-0 p-6 flex flex-col gap-5 overflow-hidden">
            {view === "overview" && (
              <OverviewView counts={counts} weekSeries={weekSeries} weekDelta={weekDelta}
                            conversionRate={conversionRate} leads={leads} notes={notes}
                            onSelect={setSelectedId} onAction={onAction}
                            filter={filter} setFilter={setFilter} query={query} selectedId={selectedId} />
            )}
            {view === "leads" && (
              <LeadsTable leads={leads} filter={filter} setFilter={setFilter} query={query}
                          selectedId={selectedId} onSelect={setSelectedId}
                          onAction={onAction} counts={counts}/>
            )}
            {view === "inbox" && (
              <div className="grid grid-cols-1 gap-5 min-h-0 flex-1">
                <GmailPanel notes={notes} connected={gmailConnected} configured={Gmail.isConfigured()} loading={gmailLoading} onConnect={connectGmail} onDisconnect={disconnectGmail} onOpen={openFromInbox}/>
              </div>
            )}
            {view === "analytics" && (
              <AnalyticsView counts={counts} weekSeries={weekSeries} weekDelta={weekDelta} conversionRate={conversionRate} leads={leads}/>
            )}
            {view === "settings" && <SettingsView/>}
          </div>

          {view === "overview" && (
            <div className="w-[380px] shrink-0 h-full border-l border-white/[0.06] p-6 pl-5 flex flex-col gap-5 overflow-hidden">
              <GmailPanel notes={notes} connected={gmailConnected} configured={Gmail.isConfigured()} loading={gmailLoading} onConnect={connectGmail} onDisconnect={disconnectGmail} onOpen={openFromInbox}/>
            </div>
          )}
        </main>
      </div>

      {selected && <LeadPanel lead={selected} onClose={()=>setSelectedId(null)} onAction={onAction}/>}
    </div>
  );
}

/* ================= Overview ================= */
function OverviewView({ counts, weekSeries, weekDelta, conversionRate, leads, notes, onSelect, onAction, filter, setFilter, query, selectedId }){
  const thisWeek = leads.filter(l => Date.now() - new Date(l.submittedAt) < 7*86400000).length;

  const kpiSeries = useMemo(()=>{
    const total = Array(14).fill(0), newL = Array(14).fill(0), cont = Array(14).fill(0);
    for (let i=0;i<14;i++){ total[i] = weekSeries[i]?.count ?? 0; }
    // Simulated trend for contacted/conversion
    const rn = (s) => { let x=s; return ()=>{ x=(x*9301+49297)%233280; return x/233280; }; };
    const r = rn(leads.length+7);
    for (let i=0;i<14;i++){ newL[i] = Math.max(0, total[i] - Math.floor(r()*2)); cont[i] = Math.max(0, Math.floor(total[i]*0.6 + r()*2)); }
    return { total, newL, cont };
  },[weekSeries, leads.length]);

  return (
    <>
      <div className="grid grid-cols-4 gap-5">
        <KpiCard label="Total Leads"    value={fmt(counts.all)}       delta={weekDelta}   accent="cyan"   points={kpiSeries.total}/>
        <KpiCard label="New · 7d"       value={fmt(thisWeek)}         delta={weekDelta}   accent="purple" points={kpiSeries.newL}/>
        <KpiCard label="Contacted"      value={fmt(counts.contacted)} delta="+12%"       accent="cyan"   points={kpiSeries.cont}/>
        <KpiCard label="Conversion"     value={conversionRate+"%"}    delta="+4.2%"      accent="purple" points={kpiSeries.cont}/>
      </div>

      <div className="grid grid-cols-3 gap-5">
        <div className="col-span-2"><WeeklyChart series={weekSeries}/></div>
        <StatusRing counts={counts}/>
      </div>

      <div className="flex-1 min-h-0">
        <LeadsTable leads={leads} filter={filter} setFilter={setFilter} query={query}
                    selectedId={selectedId} onSelect={onSelect}
                    onAction={onAction} counts={counts}/>
      </div>
    </>
  );
}

/* ================= Analytics ================= */
function AnalyticsView({ counts, weekSeries, weekDelta, conversionRate, leads }){
  const bySource = useMemo(()=>{
    const m = new Map();
    for (const l of leads){ m.set(l.source, (m.get(l.source)||0)+1); }
    return [...m.entries()].sort((a,b)=>b[1]-a[1]);
  },[leads]);
  const max = Math.max(1, ...bySource.map(([,n])=>n));
  return (
    <>
      <div className="grid grid-cols-4 gap-5">
        <KpiCard label="Total Leads" value={fmt(counts.all)}       delta={weekDelta}    accent="cyan"   points={weekSeries.map(s=>s.count)}/>
        <KpiCard label="New"         value={fmt(counts.new)}       delta={"+"+fmt(counts.new)} accent="purple" points={weekSeries.map(s=>s.count)}/>
        <KpiCard label="Contacted"   value={fmt(counts.contacted)} delta="+12%"         accent="cyan"   points={weekSeries.map(s=>s.count)}/>
        <KpiCard label="Conversion"  value={conversionRate+"%"}    delta="+4.2%"        accent="purple" points={weekSeries.map(s=>s.count)}/>
      </div>
      <div className="grid grid-cols-3 gap-5">
        <div className="col-span-2"><WeeklyChart series={weekSeries}/></div>
        <StatusRing counts={counts}/>
      </div>
      <div className="glass rounded-2xl p-5">
        <div className="font-display text-[15px] font-semibold tracking-tight">Leads by source</div>
        <div className="text-[11px] text-slate-500 mt-0.5">Where your inbound conversations originate</div>
        <div className="mt-4 space-y-3">
          {bySource.map(([s,n])=>(
            <div key={s} className="flex items-center gap-3">
              <div className="w-36 text-[13px] font-medium text-slate-200 font-mono truncate">{s}</div>
              <div className="flex-1 h-2 rounded-full bg-white/[0.04] overflow-hidden">
                <div className="h-full rounded-full" style={{ width: ((n/max)*100)+"%", background:"linear-gradient(90deg,#22d3ee,#a855f7)" }}/>
              </div>
              <div className="w-10 text-right text-[12.5px] text-slate-300 font-mono">{n}</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
